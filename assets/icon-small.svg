<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#23222a"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#sheen)"/>

  <!--
    Small-size variant: a single bold peak followed by a flat line.
    Simpler silhouette so it survives at 16x16 toolbar size.
    Same metaphor (sound being quieted) just with less detail.
  -->
  <path
    d="M 28 80
       Q 50 18 72 80
       L 100 80"
    fill="none"
    stroke="#ffffff"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
