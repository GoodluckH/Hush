<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm-tinted near-black, suggests calm/premium rather than tech-cold -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#23222a"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <!-- Subtle inner highlight along the top edge for depth -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#sheen)"/>

  <!--
    Quieting wave: three peaks of decreasing amplitude, ending flat.
    Reads as sound being hushed left → right.
    Stroke is generous so it survives at 16x16.
  -->
  <path
    d="M 22 78
       Q 35 28 48 78
       Q 60 50 72 78
       L 106 78"
    fill="none"
    stroke="#ffffff"
    stroke-width="9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Terminal dot — the 'silence' at the end of the wave -->
  <circle cx="106" cy="78" r="3.5" fill="#ffffff" opacity="0.55"/>
</svg>
